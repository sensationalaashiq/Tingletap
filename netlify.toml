[build]
  command   = "npm run build"
  publish   = "dist"
  functions = "netlify/functions"

[build.environment]
  NODE_VERSION = "20"

# SPA fallback — all paths serve index.html
[[redirects]]
  from   = "/*"
  to     = "/index.html"
  status = 200

# Allow Netlify Functions to be called from the frontend
[functions]
  node_bundler = "esbuild"
  external_node_modules = ["firebase-admin"]
  included_files = ["Templates/**"]
