<!doctype html>
<html lang="en-IN">
  <head>
    <meta charset="UTF-8" />

    <!-- Viewport — no user-scalable=no (accessibility + SEO penalty removed) -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />

    <!-- ══════════════════════════════════════════════════════════
         PRIMARY SEO — static fallback for bots/crawlers that skip JavaScript.

         data-rh="true" tells react-helmet-async to REPLACE each tag on mount
         with the page-specific value from SEO.jsx — zero duplicates in the DOM
         for real users who execute JS.

         For social-media bots (WhatsApp, Telegram, Facebook, Twitter/X,
         Discord, LinkedIn, Slack) that do NOT execute JS, the Netlify Edge
         Function `seo-bot-meta` intercepts the request first, swaps in the
         path-specific title/description/url, and returns the modified HTML so
         bots see the correct card for every public page.

         These static values are the site-level landing-page defaults — correct
         for the root URL ("/") and a safe fallback for any unrecognised path.
    ══════════════════════════════════════════════════════════ -->

    <!-- Core title + description -->
    <title data-rh="true">TingleTap — India's #1 Free Chat App | Live Chat Rooms, Voice &amp; Video Calls</title>
    <meta data-rh="true" name="description" content="Join TingleTap — India's most vibrant free chat platform, loved by Indians worldwide. Live chat rooms, private messaging, voice &amp; video calls, RJ radio shows, GIF sharing, auto translation. Connect with India and the global desi community. 100% free, no download required." />
    <meta name="theme-color" content="#7c3aed" />

    <!-- Open Graph — WhatsApp, Telegram, Facebook, Discord, LinkedIn previews -->
    <meta data-rh="true" property="og:type"         content="website" />
    <meta data-rh="true" property="og:site_name"    content="TingleTap" />
    <meta data-rh="true" property="og:title"        content="TingleTap — India's #1 Free Chat App | Live Chat Rooms, Voice &amp; Video Calls" />
    <meta data-rh="true" property="og:description"  content="Join TingleTap — India's most vibrant free chat platform. Live chat rooms, private messaging, voice &amp; video calls, RJ radio shows, GIF sharing, auto translation. 100% free." />
    <meta data-rh="true" property="og:url"          content="https://tingletap.com/" />
    <meta data-rh="true" property="og:image"        content="https://tingletap.com/tingletap-logo.jpg" />
    <meta data-rh="true" property="og:image:secure_url" content="https://tingletap.com/tingletap-logo.jpg" />
    <meta data-rh="true" property="og:image:alt"    content="TingleTap — Free Chat Rooms, Voice &amp; Video Calls" />
    <meta data-rh="true" property="og:image:width"  content="1200" />
    <meta data-rh="true" property="og:image:height" content="630" />
    <meta data-rh="true" property="og:image:type"   content="image/jpeg" />
    <meta data-rh="true" property="og:locale"       content="en_IN" />

    <!-- Twitter / X Card — bot preview fallback -->
    <meta data-rh="true" name="twitter:card"        content="summary_large_image" />
    <meta data-rh="true" name="twitter:site"        content="@tingletaps" />
    <meta data-rh="true" name="twitter:creator"     content="@tingletaps" />
    <meta data-rh="true" name="twitter:title"       content="TingleTap — India's #1 Free Chat App | Live Chat Rooms, Voice &amp; Video Calls" />
    <meta data-rh="true" name="twitter:description" content="Join TingleTap — India's most vibrant free chat platform. Live chat rooms, private messaging, voice &amp; video calls, RJ radio shows, GIF sharing, auto translation. 100% free." />
    <meta data-rh="true" name="twitter:image"       content="https://tingletap.com/tingletap-logo.jpg" />
    <meta data-rh="true" name="twitter:image:alt"   content="TingleTap — Free Chat Rooms, Voice &amp; Video Calls" />

    <!-- Canonical — default to root; Helmet sets the page-specific href on mount -->
    <link data-rh="true" rel="canonical" href="https://tingletap.com/" />

    <!-- Geo targeting — not managed by React Helmet -->
    <meta name="geo.region" content="IN" />
    <meta name="geo.country" content="India" />
    <meta name="ICBM" content="20.5937, 78.9629" />

    <!-- ══════════════════════════════════════════════════════════
         PWA / Mobile App Meta Tags
    ══════════════════════════════════════════════════════════ -->
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="TingleTap" />
    <meta name="msapplication-TileColor" content="#7c3aed" />
    <meta name="msapplication-TileImage" content="/tingletap-logo.jpg" />
    <meta name="msapplication-config" content="none" />
    <meta name="format-detection" content="telephone=no" />

    <!-- FIX M-17: Removed 30+ hreflang tags that all pointed to the same URL.
         Google flags duplicate hreflang signals as errors in Search Console and
         ignores them. hreflang is only meaningful when distinct translated pages
         exist at distinct URLs. Kept only x-default (universal fallback). -->
    <link rel="alternate" hreflang="x-default" href="https://tingletap.com/" />

    <!-- ══════════════════════════════════════════════════════════
         Favicon & Icons — Multi-format for Google Search & all browsers
         ICO  → IE / old crawlers / Google favicon fallback
         PNG  → Chrome, Firefox, modern crawlers (16×16 & 32×32 required by Google)
         SVG  → Modern browsers (Chrome 80+, Firefox 41+)
         Apple → iOS home-screen icon
    ══════════════════════════════════════════════════════════ -->
    <link rel="icon" href="/favicon.ico" sizes="any" />
    <link rel="icon" type="image/png" sizes="16x16"  href="/favicon-16x16.png" />
    <link rel="icon" type="image/png" sizes="32x32"  href="/favicon-32x32.png" />
    <link rel="icon" type="image/png" sizes="192x192" href="/favicon-192x192.png" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="shortcut icon" href="/favicon.ico" />
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />
    <link rel="mask-icon" href="/favicon.svg" color="#7c3aed" />

    <!-- PWA Manifest -->
    <link rel="manifest" href="/manifest.json" />

    <!-- OpenSearch — allows browsers & Bing to add TingleTap as a search engine -->
    <link rel="search" type="application/opensearchdescription+xml" title="TingleTap" href="/opensearch.xml" />

    <!-- ══════════════════════════════════════════════════════════
         Performance — Preconnect & DNS Prefetch
         Tier 1 — preconnect: full TCP+TLS+HTTP negotiation saved
         Tier 2 — dns-prefetch: DNS lookup only (lower priority origins)
    ══════════════════════════════════════════════════════════ -->

    <!-- Google Fonts (render-critical) -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

    <!-- Firebase — all SDK endpoints used at startup -->
    <link rel="preconnect" href="https://firestore.googleapis.com" crossorigin />
    <link rel="preconnect" href="https://firebase.googleapis.com" crossorigin />
    <link rel="preconnect" href="https://identitytoolkit.googleapis.com" crossorigin />
    <link rel="preconnect" href="https://securetoken.googleapis.com" crossorigin />
    <link rel="preconnect" href="https://firebasestorage.googleapis.com" crossorigin />
    <link rel="preconnect" href="https://www.googleapis.com" crossorigin />

    <!-- Firebase RTDB dns-prefetch is set at deploy time via the hosting platform -->

    <!-- Secondary services — dns-prefetch -->
    <link rel="dns-prefetch" href="https://randomuser.me" />
    <link rel="dns-prefetch" href="https://api.giphy.com" />
    <link rel="dns-prefetch" href="https://api.agora.io" />
    <link rel="dns-prefetch" href="https://api.abstractapi.com" />
    <link rel="dns-prefetch" href="https://api.emailjs.com" />
    <link rel="dns-prefetch" href="https://generativelanguage.googleapis.com" />
    <link rel="dns-prefetch" href="https://www.youtube.com" />

    <!-- Preload LCP element (logo — above-the-fold on all pages) -->
    <link rel="preload" as="image" href="/tingletap-logo.jpg" fetchpriority="high" />

    <!-- Preload Google Fonts stylesheet (non-blocking via media trick) -->
    <link rel="preload" as="style" href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Dancing+Script:wght@400;700&family=Pacifico&family=Lobster&family=Kaushan+Script&family=Amatic+SC:wght@400;700&family=Caveat:wght@400;700&family=Indie+Flower&family=Permanent+Marker&family=Sacramento&family=Pinyon+Script&family=Cinzel:wght@400;700;900&family=Playfair+Display:wght@400;700;900&family=Cormorant+Garamond:wght@400;600;700&family=Orbitron:wght@400;700;900&family=Righteous&family=Bebas+Neue&family=Abril+Fatface&family=Fredoka:wght@400;600;700&family=Russo+One&family=Poiret+One&family=Press+Start+2P&family=Comfortaa:wght@400;700&display=swap" />

    <!-- OG / Twitter / DC / robots / per-bot / content-classification:
         All injected exclusively by React Helmet (SEO.jsx) — removed from here
         to eliminate duplicate meta tags after React mounts (H-08 fix). -->

    <!-- ══════════════════════════════════════════════════════════
         Structured Data — Global schema only (pre-render fallback).
         Page-specific schemas (WebPage, SoftwareApplication, FAQPage, etc.)
         are injected per-route by React Helmet via StructuredData.jsx —
         keeping one source of truth and avoiding duplicate @id conflicts.
    ══════════════════════════════════════════════════════════ -->

            "contactType": "Customer Support",
            "url": "https://tingletap.com/contact",
            "availableLanguage": ["English", "Hindi"],
            "areaServed": "Worldwide"
          },
          "sameAs": [
            "https://www.instagram.com/tingletap",
            "https://www.facebook.com/share/18uwA1Ybpd/",
            "https://x.com/tingletaps",
            "https://youtube.com/@tingletaps",
            "https://www.linkedin.com/in/tingle-tap-b8aa38253",
            "https://www.threads.com/@tingletap"
          ],
          "knowsAbout": ["Online Chat", "Real-time Communication", "Private Messaging", "Voice Chat", "Video Calls", "Social Networking"]
        },
        {
          "@type": "WebSite",
          "@id": "https://tingletap.com/#website",

              "@type": "EntryPoint",

    <!-- ══════════════════════════════════════════════════════════
         Google Fonts — render-blocking minimized, display=swap
    ══════════════════════════════════════════════════════════ -->
    <link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Dancing+Script:wght@400;700&family=Pacifico&family=Lobster&family=Kaushan+Script&family=Amatic+SC:wght@400;700&family=Caveat:wght@400;700&family=Indie+Flower&family=Permanent+Marker&family=Sacramento&family=Pinyon+Script&family=Cinzel:wght@400;700;900&family=Playfair+Display:wght@400;700;900&family=Cormorant+Garamond:wght@400;600;700&family=Orbitron:wght@400;700;900&family=Righteous&family=Bebas+Neue&family=Abril+Fatface&family=Fredoka:wght@400;600;700&family=Russo+One&family=Poiret+One&family=Press+Start+2P&family=Comfortaa:wght@400;700&display=swap" rel="stylesheet" />

    <!-- FIX M-18: FOUC prevention — apply theme class synchronously before first paint.
         useEffect fires after the browser paints, causing a visible white flash for
         dark-mode users. This inline script reads localStorage and applies the correct
         class before any CSS or React renders, eliminating the flicker entirely. -->
    <script>
      (function() {
        try {
          var theme = localStorage.getItem('selectedTheme') || 'light';
          var body = document.documentElement;
          if (theme === 'dark' || theme === 'dark-mode') {
            body.classList.add('dark-mode', 'theme-dark');
          } else if (theme === 'burgundy') {
            body.classList.add('theme-burgundy');
          } else if (theme === 'aurora') {
            body.classList.add('theme-aurora');
          } else {
            body.classList.add('theme-light');
          }
        } catch (e) {}
      })();
    </script>
  </head>
  <body>
    <!-- C18: Skip-navigation link for keyboard/screen-reader users -->
    <a href="#root" class="sr-skip-link" style="position:absolute;left:-9999px;top:4px;z-index:9999;padding:8px 16px;background:#7c3aed;color:#fff;border-radius:4px;font-weight:700;text-decoration:none" onfocus="this.style.left='4px'" onblur="this.style.left='-9999px'">Skip to content</a>
    <!-- role="main" is applied via React's root render; id="root" serves as the landmark target -->
    <div id="root" role="main" aria-label="TingleTap application"></div>
    <script type="module" src="/src/index.jsx"></script>
  </body>
</html>
