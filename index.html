<!doctype html>
<html lang="en-IN">
  <head>
    <meta charset="UTF-8" />

    <!-- Viewport — no user-scalable=no (accessibility + SEO penalty removed) -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />

    <!-- ══════════════════════════════════════════════════════════
         PRIMARY SEO — Fallback before React Helmet renders
    ══════════════════════════════════════════════════════════ -->
    <title>TingleTap — India's #1 Free Chat App | Chat Rooms, Voice & Video Calls</title>
    <meta name="description" content="TingleTap is India's #1 free online chat platform. Join live chat rooms, send private messages, make voice & video calls, share GIFs. Connect with Indians across the country — free forever." />
    <meta name="keywords" content="TingleTap, Indian chat app, online chat India free, desi chat rooms, Hindi chat room, free chatting India, live chat rooms India, voice chat India, video call India, chat with strangers India, best chat app India, Indian chat community, chat online without registration India, free chat app India 2025, online mitra chat" />
    <meta name="author" content="TingleTap — Adrashtra Inc." />
    <meta name="robots" content="index, follow, max-snippet:-1, max-image-preview:large, max-video-preview:-1" />
    <meta name="theme-color" content="#7c3aed" />
    <meta name="language" content="en-IN" />
    <meta name="rating" content="general" />
    <meta name="revisit-after" content="3 days" />
    <meta name="copyright" content="TingleTap — Adrashtra Inc." />
    <meta name="application-name" content="TingleTap" />
    <meta name="generator" content="TingleTap v1.0" />

    <!-- Geo targeting — India -->
    <meta name="geo.region" content="IN" />
    <meta name="geo.country" content="India" />
    <meta name="ICBM" content="20.5937, 78.9629" />

    <!-- ══════════════════════════════════════════════════════════
         PWA / Mobile App Meta Tags
    ══════════════════════════════════════════════════════════ -->
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="TingleTap" />
    <meta name="msapplication-TileColor" content="#7c3aed" />
    <meta name="msapplication-TileImage" content="/tingletap-logo.jpg" />
    <meta name="msapplication-config" content="none" />
    <meta name="format-detection" content="telephone=no" />

    <!-- ══════════════════════════════════════════════════════════
         Alternate hreflang (canonical is set per-route by React Helmet)
    ══════════════════════════════════════════════════════════ -->
    <link rel="alternate" hreflang="en-IN" href="https://tingletap.com/" />
    <link rel="alternate" hreflang="x-default" href="https://tingletap.com/" />

    <!-- ══════════════════════════════════════════════════════════
         Favicon & Icons
    ══════════════════════════════════════════════════════════ -->
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="shortcut icon" href="/favicon.svg" />
    <link rel="apple-touch-icon" sizes="180x180" href="/tingletap-logo.jpg" />
    <link rel="apple-touch-icon" href="/tingletap-logo.jpg" />
    <link rel="mask-icon" href="/favicon.svg" color="#7c3aed" />

    <!-- PWA Manifest -->
    <link rel="manifest" href="/manifest.json" />

    <!-- ══════════════════════════════════════════════════════════
         Performance — Preconnect & DNS Prefetch
    ══════════════════════════════════════════════════════════ -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link rel="dns-prefetch" href="https://firestore.googleapis.com" />
    <link rel="dns-prefetch" href="https://firebase.googleapis.com" />
    <link rel="dns-prefetch" href="https://identitytoolkit.googleapis.com" />
    <link rel="dns-prefetch" href="https://tingletapofraj-default-rtdb.asia-southeast1.firebasedatabase.app" />
    <link rel="dns-prefetch" href="https://randomuser.me" />
    <link rel="dns-prefetch" href="https://api.giphy.com" />

    <!-- Preload critical logo image (LCP element) -->
    <link rel="preload" as="image" href="/tingletap-logo.jpg" />

    <!-- ══════════════════════════════════════════════════════════
         Open Graph (Facebook, WhatsApp, Telegram, Discord)
    ══════════════════════════════════════════════════════════ -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="TingleTap" />
    <meta property="og:title" content="TingleTap — India's #1 Free Chat App | Chat Rooms, Voice & Video Calls" />
    <meta property="og:description" content="Join TingleTap — India's #1 free chat platform. Live chat rooms, private messaging, voice & video calls, GIFs and premium customization. Join free today." />
    <meta property="og:url" content="https://tingletap.com/" />
    <meta property="og:image" content="https://tingletap.com/tingletap-logo.jpg" />
    <meta property="og:image:secure_url" content="https://tingletap.com/tingletap-logo.jpg" />
    <meta property="og:image:alt" content="TingleTap — India's #1 Free Chat Platform" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:image:type" content="image/jpeg" />
    <meta property="og:locale" content="en_IN" />
    <meta property="og:locale:alternate" content="hi_IN" />

    <!-- ══════════════════════════════════════════════════════════
         Twitter / X Card
    ══════════════════════════════════════════════════════════ -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:site" content="@TingleTap" />
    <meta name="twitter:creator" content="@TingleTap" />
    <meta name="twitter:title" content="TingleTap — India's #1 Free Chat App" />
    <meta name="twitter:description" content="India's most vibrant chat community. Live chat rooms, private messaging, voice & video calls. Join free." />
    <meta name="twitter:image" content="https://tingletap.com/tingletap-logo.jpg" />
    <meta name="twitter:image:alt" content="TingleTap — India's #1 Free Chat Platform" />

    <!-- ══════════════════════════════════════════════════════════
         Structured Data — Global schema only (pre-render fallback).
         Page-specific schemas (WebPage, SoftwareApplication, FAQPage, etc.)
         are injected per-route by React Helmet via StructuredData.jsx —
         keeping one source of truth and avoiding duplicate @id conflicts.
    ══════════════════════════════════════════════════════════ -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@graph": [
        {
          "@type": "Organization",
          "@id": "https://tingletap.com/#organization",
          "name": "TingleTap",
          "legalName": "Adrashtra Inc.",
          "alternateName": ["Tingle Tap", "TingleTap Chat", "Tingle, Tap, Talk"],
          "url": "https://tingletap.com/",
          "logo": {
            "@type": "ImageObject",
            "@id": "https://tingletap.com/#logo",
            "url": "https://tingletap.com/tingletap-logo.jpg",
            "contentUrl": "https://tingletap.com/tingletap-logo.jpg",
            "width": 512,
            "height": 512,
            "caption": "TingleTap Logo"
          },
          "image": { "@id": "https://tingletap.com/#logo" },
          "description": "India's premier real-time chat platform. Connect through public chat rooms, private messaging, voice and video calls, and premium customization.",
          "foundingDate": "2024",
          "foundingLocation": { "@type": "Country", "name": "India" },
          "areaServed": "IN",
          "contactPoint": {
            "@type": "ContactPoint",
            "contactType": "Customer Support",
            "url": "https://tingletap.com/contact",
            "availableLanguage": ["English", "Hindi"]
          },
          "sameAs": [],
          "knowsAbout": ["Online Chat", "Real-time Communication", "Private Messaging", "Voice Chat", "Video Calls", "Social Networking"]
        },
        {
          "@type": "WebSite",
          "@id": "https://tingletap.com/#website",
          "url": "https://tingletap.com/",
          "name": "TingleTap",
          "alternateName": "Tingle, Tap, Talk",
          "description": "India's #1 free online chat platform with live chat rooms, private messaging, voice & video calls, and premium customization.",
          "publisher": { "@id": "https://tingletap.com/#organization" },
          "inLanguage": ["en-IN", "hi"],
          "potentialAction": {
            "@type": "SearchAction",
            "target": {
              "@type": "EntryPoint",
              "urlTemplate": "https://tingletap.com/faq?q={search_term_string}"
            },
            "query-input": "required name=search_term_string"
          }
        }
      ]
    }
    </script>

</html>
